stages:
  - build
  - deploy

variables:
  IMAGE_NAME: "ocamltest:latest"

build_image:
  stage: build
  image: docker:24  # or any recent Docker version
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t $IMAGE_NAME ./programme
    - docker push "$IMAGE_NAME"


pages:
  stage: deploy 
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/programme:/app" -w /app $IMAGE_NAME    
    - mkdir -p public
    - cp programme/output.txt public/index.html
  artifacts:
    paths:
      - public

