include:
  - project: ulysse_durand/gitlabci-templates
    file: templates/gitlab-registry-build-push.yml

stages:
  - build
  - test
  - deploy-tests

variables:
  IMAGENAME_RUN: ocamlrun 
  IMAGENAME_API: ocamlapi

build-ocamlrun:
  stage: build
  extends: .gitlab-registry-build-push
  variables:
    IMAGENAME: $IMAGENAME_RUN
    BUILD_CONTEXT: .
    DOCKERFILE: Dockerfile.ocamlrun

test-ocamlrun:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - job: build-ocamlrun
  variables:
    IMAGE: "$CI_REGISTRY_IMAGE/$IMAGENAME_RUN:$CI_COMMIT_SHORT_SHA"
  script:
    - mkdir -p public/tests/basic/output
    - cd tests/
    - chmod +x test-ocamlrun.sh
    - ./test-ocamlrun.sh
    - cp output.txt $CI_PROJECT_DIR/public/tests/ocamlrun/output.txt
  artifacts:
    paths:
      - public/tests/ocamlrun/output.txt

pages:
  stage: deploy-tests
  script:
    - echo "Deploying GitLab pages..."
  artifacts:
    paths:
      - public

