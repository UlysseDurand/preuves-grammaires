default:
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

stages:
  - build
  - deploy

variables:
  IMAGE_NAME: "ocamltest:latest"

build_image:
  stage: build
  script:
    - docker build -t $IMAGE_NAME ./programme
    - docker push "$IMAGE_NAME"

pages:
  stage: deploy 
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/programme:/app" -w /app $IMAGE_NAME    
    - mkdir -p public
    - cp programme/output.txt public/index.html
  artifacts:
    paths:
      - public

